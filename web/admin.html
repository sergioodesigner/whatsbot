<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsBot SaaS Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <main class="max-w-6xl mx-auto p-6 space-y-6">
    <header class="bg-white rounded-xl shadow p-5">
      <h1 class="text-2xl font-bold">WhatsBot SaaS - Superadmin</h1>
      <p class="text-sm text-slate-600 mt-1">Gestão operacional e comercial dos tenants.</p>
      <p id="status" class="text-sm mt-3 text-slate-700">Carregando...</p>
    </header>

    <section id="setup-section" class="bg-white rounded-xl shadow p-5 space-y-3 hidden">
      <h2 class="text-lg font-semibold">Setup inicial</h2>
      <form id="setup-form" class="space-y-3">
        <input id="setup-username" class="w-full border rounded px-3 py-2" placeholder="Usuário" autocomplete="username" required />
        <input id="setup-password" type="password" class="w-full border rounded px-3 py-2" placeholder="Senha (min 6)" autocomplete="new-password" required />
        <button class="bg-slate-900 text-white px-4 py-2 rounded" type="submit">Criar superadmin</button>
      </form>
    </section>

    <section id="login-section" class="bg-white rounded-xl shadow p-5 space-y-3 hidden">
      <h2 class="text-lg font-semibold">Login superadmin</h2>
      <form id="login-form" class="space-y-3">
        <input id="login-username" class="w-full border rounded px-3 py-2" placeholder="Usuário" autocomplete="username" required />
        <input id="login-password" type="password" class="w-full border rounded px-3 py-2" placeholder="Senha" autocomplete="current-password" required />
        <button class="bg-blue-700 text-white px-4 py-2 rounded" type="submit">Entrar</button>
      </form>
    </section>

    <section id="tenant-create-section" class="bg-white rounded-xl shadow p-5 space-y-4 hidden">
      <h2 class="text-lg font-semibold">Criar empresa</h2>
      <form id="tenant-form" class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <input id="tenant-name" class="border rounded px-3 py-2 md:col-span-2" placeholder="Nome da empresa" required />
        <input id="tenant-slug" class="border rounded px-3 py-2" placeholder="slug (ex: empresa1)" required />
        <button class="bg-emerald-700 text-white px-4 py-2 rounded" type="submit">Criar tenant</button>
      </form>
    </section>

    <section id="api-models-section" class="bg-white rounded-xl shadow p-5 space-y-4 hidden">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">API e modelos</h2>
        <button id="refresh-ai-policy" class="border px-3 py-1 rounded">Atualizar</button>
      </div>
      <label class="inline-flex items-center gap-2 text-sm font-medium">
        <input id="ai-policy-global-enabled" type="checkbox" class="w-4 h-4" />
        Habilitar API e modelos globalmente
      </label>
      <div id="ai-policy-tenants" class="overflow-x-auto text-sm"></div>
      <div class="border-t pt-3 flex items-center justify-between">
        <div class="text-sm">
          <div>Versão atual: <span id="admin-current-version" class="font-mono">...</span></div>
          <div>Última versão: <span id="admin-latest-version" class="font-mono">...</span></div>
        </div>
        <div class="flex gap-2">
          <button id="admin-check-update" class="border px-3 py-1 rounded">Verificar atualização</button>
          <button id="admin-apply-update" class="bg-blue-700 text-white px-3 py-1 rounded">Atualizar WhatsBot</button>
        </div>
      </div>
    </section>

    <section id="tenants-section" class="bg-white rounded-xl shadow p-5 space-y-4 hidden">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Tenants cadastrados</h2>
        <button id="refresh-tenants" class="border px-3 py-1 rounded">Atualizar</button>
      </div>
      <div id="tenants" class="overflow-x-auto text-sm"></div>
    </section>

    <section id="tenant-detail-section" class="fixed inset-0 bg-black/60 z-50 hidden">
      <div class="w-full h-full p-4 md:p-6">
      <div class="w-full h-full bg-white rounded-xl shadow-2xl p-5 space-y-4 overflow-auto">
      <div class="flex items-center justify-between sticky top-0 bg-white py-1">
        <h2 id="tenant-detail-title" class="text-lg font-semibold">Painel do tenant</h2>
        <button id="tenant-detail-close" class="border px-3 py-1 rounded">Fechar</button>
      </div>
      <div class="flex flex-wrap gap-2">
        <button data-tenant-tab="costs" class="tenant-tab px-3 py-1.5 rounded bg-slate-900 text-white">Custos</button>
        <button data-tenant-tab="executions" class="tenant-tab px-3 py-1.5 rounded border">Execuções</button>
        <button data-tenant-tab="sandbox" class="tenant-tab px-3 py-1.5 rounded border">Sandbox</button>
        <button data-tenant-tab="api" class="tenant-tab px-3 py-1.5 rounded border">API</button>
        <button data-tenant-tab="company" class="tenant-tab px-3 py-1.5 rounded border">Empresa</button>
      </div>

      <div id="tenant-tab-frame" class="hidden h-[72vh] border rounded overflow-hidden">
        <iframe id="tenant-frame" class="w-full h-full border-0"></iframe>
      </div>

      <div id="tenant-tab-api" class="hidden space-y-3">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <label class="text-sm">API Key
            <input id="tenant-api-key" type="text" class="w-full border rounded px-3 py-2 mt-1" placeholder="sk-or-..." />
          </label>
          <label class="text-sm">Execuções salvas
            <input id="tenant-max-executions" type="number" min="10" max="10000" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Modelo chat
            <input id="tenant-model" list="openrouter-models" type="text" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Modelo áudio
            <input id="tenant-audio-model" list="openrouter-models" type="text" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm md:col-span-2">Modelo imagem
            <input id="tenant-image-model" list="openrouter-models" type="text" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
        </div>
        <label class="inline-flex items-center gap-2 text-sm">
          <input id="tenant-api-enabled" type="checkbox" class="w-4 h-4" />
          Permitir API e modelos para esta empresa
        </label>
        <button id="save-tenant-api" class="bg-blue-700 text-white px-4 py-2 rounded">Salvar API</button>
      </div>

      <div id="tenant-tab-company" class="hidden space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <label class="text-sm">Nome do responsável
            <input id="company-owner-name" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Telefone
            <input id="company-owner-phone" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Plano
            <input id="company-plan-name" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Valor mensal
            <input id="company-plan-amount" type="number" step="0.01" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Dia vencimento
            <input id="company-due-day" type="number" min="1" max="31" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Início contrato
            <input id="company-contract-start" type="date" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm">Fim contrato
            <input id="company-contract-end" type="date" class="w-full border rounded px-3 py-2 mt-1" />
          </label>
          <label class="text-sm md:col-span-2">Observações
            <textarea id="company-notes" class="w-full border rounded px-3 py-2 mt-1"></textarea>
          </label>
        </div>
        <button id="save-company-profile" class="bg-blue-700 text-white px-4 py-2 rounded">Salvar dados da empresa</button>

        <div class="border-t pt-4">
          <h3 class="font-semibold mb-2">Mini financeiro (manual)</h3>
          <div class="flex gap-2 items-end flex-wrap">
            <label class="text-sm">Período (YYYY-MM)
              <input id="invoice-period" class="border rounded px-3 py-2 mt-1" placeholder="2026-04" />
            </label>
            <label class="text-sm">Vencimento
              <input id="invoice-due-date" type="date" class="border rounded px-3 py-2 mt-1" />
            </label>
            <label class="text-sm">Valor
              <input id="invoice-amount" type="number" step="0.01" class="border rounded px-3 py-2 mt-1" />
            </label>
            <label class="inline-flex items-center gap-2 text-sm mb-2">
              <input id="invoice-paid" type="checkbox" class="w-4 h-4" />
              Pago
            </label>
            <button id="save-invoice-btn" class="bg-emerald-700 text-white px-4 py-2 rounded">Salvar mensalidade</button>
          </div>
          <div id="invoice-list" class="overflow-x-auto mt-3 text-sm"></div>
        </div>
      </div>
      </div>
      </div>
    </section>
    <datalist id="openrouter-models"></datalist>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const setupSection = document.getElementById("setup-section");
    const loginSection = document.getElementById("login-section");
    const tenantCreateSection = document.getElementById("tenant-create-section");
    const apiModelsSection = document.getElementById("api-models-section");
    const tenantsSection = document.getElementById("tenants-section");
    const tenantDetailSection = document.getElementById("tenant-detail-section");
    const tenantsEl = document.getElementById("tenants");
    const aiPolicyGlobalEnabled = document.getElementById("ai-policy-global-enabled");
    const aiPolicyTenants = document.getElementById("ai-policy-tenants");
    const tenantDetailTitle = document.getElementById("tenant-detail-title");
    const tenantFrame = document.getElementById("tenant-frame");
    const adminCurrentVersion = document.getElementById("admin-current-version");
    const adminLatestVersion = document.getElementById("admin-latest-version");

    const tabFrame = document.getElementById("tenant-tab-frame");
    const tabApi = document.getElementById("tenant-tab-api");
    const tabCompany = document.getElementById("tenant-tab-company");
    const modelDatalist = document.getElementById("openrouter-models");

    let adminToken = localStorage.getItem("whatsbot_admin_token") || "";
    let currentTenantSlug = "";
    let tenantRows = [];

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? "text-sm mt-3 text-red-600" : "text-sm mt-3 text-slate-700";
    }

    function tenantLink(slug, path) {
      const parts = window.location.host.split(".");
      if (parts.length < 2) return null;
      return `${window.location.protocol}//${slug}.${parts.slice(1).join(".")}${path}`;
    }

    async function api(path, options = {}) {
      const headers = Object.assign({ "Content-Type": "application/json" }, options.headers || {});
      if (adminToken) headers.Authorization = `Bearer ${adminToken}`;
      const res = await fetch(path, Object.assign({}, options, { headers }));
      const data = await res.json().catch(() => ({ ok: false, error: "Resposta inválida" }));
      if (!res.ok || data.ok === false) throw new Error(data.error || `Erro ${res.status}`);
      return data.data;
    }

    function showMainSections(show) {
      tenantCreateSection.classList.toggle("hidden", !show);
      apiModelsSection.classList.toggle("hidden", !show);
      tenantsSection.classList.toggle("hidden", !show);
    }

    async function loadSetupStatus() {
      try {
        const data = await api("/api/admin/setup-status");
        if (data.needs_setup) {
          setupSection.classList.remove("hidden");
          loginSection.classList.add("hidden");
          showMainSections(false);
          return setStatus("Setup inicial pendente.");
        }
        setupSection.classList.add("hidden");
        if (!adminToken) {
          loginSection.classList.remove("hidden");
          showMainSections(false);
          return setStatus("Superadmin configurado. Faça login.");
        }
        loginSection.classList.add("hidden");
        showMainSections(true);
        await Promise.all([loadTenants(), loadAiPolicy(), loadUpdateInfo()]);
        setStatus("Sessão de superadmin restaurada.");
      } catch (err) {
        adminToken = "";
        localStorage.removeItem("whatsbot_admin_token");
        loginSection.classList.remove("hidden");
        showMainSections(false);
        setStatus(`Falha no setup: ${err.message}`, true);
      }
    }

    function financialBadge(financial) {
      const status = financial?.status || "em_dia";
      if (status === "atrasado") return '<span class="px-2 py-0.5 rounded bg-red-100 text-red-700 text-xs font-semibold">Atrasado</span>';
      if (status === "pendente") return '<span class="px-2 py-0.5 rounded bg-yellow-100 text-yellow-700 text-xs font-semibold">Pendente</span>';
      return '<span class="px-2 py-0.5 rounded bg-green-100 text-green-700 text-xs font-semibold">Em dia</span>';
    }

    async function loadTenants() {
      tenantRows = await api("/api/admin/tenants");
      if (!tenantRows.length) {
        tenantsEl.innerHTML = "<p>Nenhum tenant cadastrado.</p>";
        return;
      }
      tenantsEl.innerHTML = `
        <table class="w-full text-left">
          <thead><tr class="border-b">
            <th class="py-2 pr-3">Nome</th>
            <th class="py-2 pr-3">Slug</th>
            <th class="py-2 pr-3">Status</th>
            <th class="py-2 pr-3">WhatsApp</th>
            <th class="py-2 pr-3">Mensagens</th>
            <th class="py-2 pr-3">Financeiro</th>
            <th class="py-2 pr-3">Ações</th>
          </tr></thead>
          <tbody>
            ${tenantRows.map(t => `
              <tr class="border-b">
                <td class="py-2 pr-3 font-medium">${t.name}</td>
                <td class="py-2 pr-3">${t.slug}</td>
                <td class="py-2 pr-3">${t.status}</td>
                <td class="py-2 pr-3">${t.whatsapp_connected ? "Sim" : "Não"}</td>
                <td class="py-2 pr-3">${t.msg_count}</td>
                <td class="py-2 pr-3">${financialBadge(t.financial)}</td>
                <td class="py-2 pr-3"><button class="text-blue-700 hover:underline" data-open-tenant="${t.slug}">Abrir painel</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function loadAiPolicy() {
      const data = await api("/api/admin/ai-policy");
      aiPolicyGlobalEnabled.checked = !!data.global_enabled;
      aiPolicyTenants.innerHTML = `
        <table class="w-full text-left">
          <thead><tr class="border-b">
            <th class="py-2 pr-3">Tenant</th>
            <th class="py-2 pr-3">Permissão API</th>
            <th class="py-2 pr-3">Status efetivo</th>
          </tr></thead>
          <tbody>
            ${(data.tenants || []).map(t => `
              <tr class="border-b">
                <td class="py-2 pr-3">${t.name} <span class="text-slate-500">(${t.slug})</span></td>
                <td class="py-2 pr-3">
                  <input type="checkbox" data-ai-tenant="${t.slug}" ${t.enabled ? "checked" : ""} ${data.global_enabled ? "" : "disabled"} />
                </td>
                <td class="py-2 pr-3">${t.effective_enabled ? "Ativo" : "Bloqueado"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function loadUpdateInfo() {
      const data = await api("/api/admin/update/check");
      adminCurrentVersion.textContent = data.current_version || "...";
      adminLatestVersion.textContent = data.latest_version || "...";
    }

    async function loadModelSuggestions() {
      try {
        const models = await api("/api/admin/models");
        modelDatalist.innerHTML = (models || []).slice(0, 500).map(m =>
          `<option value="${(m.id || "").replace(/"/g, "&quot;")}">${m.name || m.id}</option>`
        ).join("");
      } catch (_) {
        modelDatalist.innerHTML = "";
      }
    }

    async function getDelegatedUrl(slug, path) {
      const base = tenantLink(slug, path);
      if (!base) throw new Error("Host inválido.");
      const delegated = await api(`/api/admin/tenants/${encodeURIComponent(slug)}/delegate-token`, {
        method: "POST",
        body: JSON.stringify({ ttl_seconds: 600 }),
      });
      const token = delegated.token || "";
      if (!token) throw new Error("Token delegado inválido.");
      const sep = base.includes("?") ? "&" : "?";
      return `${base}${sep}sa_token=${encodeURIComponent(token)}&sa_tenant=${encodeURIComponent(slug)}&sa_embed=1`;
    }

    function activateTab(tab) {
      document.querySelectorAll(".tenant-tab").forEach(btn => {
        const on = btn.dataset.tenantTab === tab;
        btn.className = on ? "tenant-tab px-3 py-1.5 rounded bg-slate-900 text-white" : "tenant-tab px-3 py-1.5 rounded border";
      });
      tabFrame.classList.toggle("hidden", !["costs", "executions", "sandbox"].includes(tab));
      tabApi.classList.toggle("hidden", tab !== "api");
      tabCompany.classList.toggle("hidden", tab !== "company");
    }

    async function openTenantDetail(slug, firstTab = "costs") {
      currentTenantSlug = slug;
      tenantDetailSection.classList.remove("hidden");
      tenantDetailTitle.textContent = `Painel da empresa: ${slug}`;
      activateTab(firstTab);
      if (["costs", "executions", "sandbox"].includes(firstTab)) {
        tenantFrame.src = await getDelegatedUrl(slug, `/${firstTab}`);
      }
      if (firstTab === "api") {
        await loadModelSuggestions();
        await loadTenantApiSettings(slug);
      }
      if (firstTab === "company") await loadTenantCompany(slug);
    }

    async function loadTenantApiSettings(slug) {
      const data = await api(`/api/admin/tenants/${encodeURIComponent(slug)}/api-settings`);
      document.getElementById("tenant-api-enabled").checked = !!data.api_models_enabled;
      document.getElementById("tenant-api-enabled").disabled = !data.api_models_globally_enabled;
      document.getElementById("tenant-api-key").value = data.openrouter_api_key || "";
      document.getElementById("tenant-model").value = data.model || "";
      document.getElementById("tenant-audio-model").value = data.audio_model || "";
      document.getElementById("tenant-image-model").value = data.image_model || "";
      document.getElementById("tenant-max-executions").value = data.max_executions ?? 200;
    }

    function dateInputFromTs(ts) {
      if (!ts) return "";
      const d = new Date(ts * 1000);
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${month}-${day}`;
    }

    function nextPeriod(periodYm) {
      const [year, month] = String(periodYm || "").split("-").map(Number);
      if (!year || !month) {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}`;
      }
      const next = new Date(year, month, 1);
      return `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, "0")}`;
    }

    function dueDateForPeriod(periodYm, dueDay) {
      const [year, month] = String(periodYm || "").split("-").map(Number);
      const safeDay = Math.min(Math.max(parseInt(dueDay || 10, 10), 1), 28);
      if (!year || !month) return "";
      return `${year}-${String(month).padStart(2, "0")}-${String(safeDay).padStart(2, "0")}`;
    }

    function tsFromDateInput(v) {
      if (!v) return null;
      return Math.floor(new Date(`${v}T00:00:00`).getTime() / 1000);
    }

    function renderInvoiceList(invoices = []) {
      const el = document.getElementById("invoice-list");
      if (!invoices.length) {
        el.innerHTML = "<p class='text-slate-500'>Nenhuma mensalidade cadastrada.</p>";
        return;
      }
      el.innerHTML = `
        <table class="w-full text-left">
          <thead><tr class="border-b">
            <th class="py-2 pr-3">Período</th>
            <th class="py-2 pr-3">Vencimento</th>
            <th class="py-2 pr-3">Valor</th>
            <th class="py-2 pr-3">Pago</th>
          </tr></thead>
          <tbody>
            ${invoices.map(i => `
              <tr class="border-b">
                <td class="py-2 pr-3">${i.period_ym}</td>
                <td class="py-2 pr-3">${dateInputFromTs(i.due_ts)}</td>
                <td class="py-2 pr-3">R$ ${Number(i.amount || 0).toFixed(2)}</td>
                <td class="py-2 pr-3">${i.paid ? "Sim" : "Não"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function prefillNextInvoice(profile = {}, invoices = []) {
      const openPeriods = invoices
        .filter(i => !i.paid)
        .map(i => i.period_ym)
        .sort();
      const allPeriods = invoices.map(i => i.period_ym).sort();
      const basePeriod = openPeriods.length ? openPeriods[openPeriods.length - 1] : allPeriods[allPeriods.length - 1];
      const period = basePeriod ? nextPeriod(basePeriod) : nextPeriod("");
      document.getElementById("invoice-period").value = period;
      document.getElementById("invoice-due-date").value = dueDateForPeriod(period, profile.due_day || 10);
      document.getElementById("invoice-amount").value = profile.plan_amount ?? 0;
      document.getElementById("invoice-paid").checked = false;
    }

    async function loadTenantCompany(slug) {
      await api(`/api/admin/tenants/${encodeURIComponent(slug)}/invoices/ensure`);
      const data = await api(`/api/admin/tenants/${encodeURIComponent(slug)}/company`);
      const p = data.profile || {};
      document.getElementById("company-owner-name").value = p.owner_name || "";
      document.getElementById("company-owner-phone").value = p.owner_phone || "";
      document.getElementById("company-plan-name").value = p.plan_name || "";
      document.getElementById("company-plan-amount").value = p.plan_amount ?? 0;
      document.getElementById("company-due-day").value = p.due_day ?? 10;
      document.getElementById("company-contract-start").value = dateInputFromTs(p.contract_start_ts);
      document.getElementById("company-contract-end").value = dateInputFromTs(p.contract_end_ts);
      document.getElementById("company-notes").value = p.notes || "";
      renderInvoiceList(data.invoices || []);
      prefillNextInvoice(p, data.invoices || []);
    }

    document.getElementById("setup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const data = await api("/api/admin/setup", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("setup-username").value.trim(),
            password: document.getElementById("setup-password").value,
          }),
        });
        adminToken = data.token || "";
        localStorage.setItem("whatsbot_admin_token", adminToken);
        await loadSetupStatus();
      } catch (err) {
        setStatus(`Erro no setup: ${err.message}`, true);
      }
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        const data = await api("/api/admin/login", {
          method: "POST",
          body: JSON.stringify({
            username: document.getElementById("login-username").value.trim(),
            password: document.getElementById("login-password").value,
          }),
        });
        adminToken = data.token || "";
        localStorage.setItem("whatsbot_admin_token", adminToken);
        await loadSetupStatus();
      } catch (err) {
        setStatus(`Erro no login: ${err.message}`, true);
      }
    });

    document.getElementById("tenant-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const slug = document.getElementById("tenant-slug").value.trim().toLowerCase();
      try {
        await api("/api/admin/tenants", {
          method: "POST",
          body: JSON.stringify({
            name: document.getElementById("tenant-name").value.trim(),
            slug,
          }),
        });
        e.target.reset();
        await loadTenants();
      } catch (err) {
        setStatus(`Erro ao criar tenant: ${err.message}`, true);
      }
    });

    document.getElementById("refresh-tenants").addEventListener("click", loadTenants);
    document.getElementById("refresh-ai-policy").addEventListener("click", loadAiPolicy);
    document.getElementById("admin-check-update").addEventListener("click", async () => {
      try {
        await loadUpdateInfo();
        setStatus("Versão verificada.");
      } catch (err) {
        setStatus(`Erro ao verificar atualização: ${err.message}`, true);
      }
    });
    document.getElementById("admin-apply-update").addEventListener("click", async () => {
      if (!confirm("Deseja atualizar o WhatsBot agora?")) return;
      try {
        const data = await api("/api/admin/update", { method: "POST" });
        await loadUpdateInfo();
        setStatus(data.message || "Atualização concluída.");
      } catch (err) {
        setStatus(`Erro ao atualizar: ${err.message}`, true);
      }
    });
    aiPolicyGlobalEnabled.addEventListener("change", async (e) => {
      try {
        await api("/api/admin/ai-policy/global", {
          method: "PUT",
          body: JSON.stringify({ enabled: e.target.checked }),
        });
        await Promise.all([loadAiPolicy(), loadTenants()]);
      } catch (err) {
        setStatus(`Erro ao atualizar política global: ${err.message}`, true);
      }
    });
    aiPolicyTenants.addEventListener("change", async (e) => {
      const input = e.target.closest("input[data-ai-tenant]");
      if (!input) return;
      try {
        await api(`/api/admin/ai-policy/tenant/${encodeURIComponent(input.dataset.aiTenant)}`, {
          method: "PUT",
          body: JSON.stringify({ enabled: input.checked }),
        });
        await Promise.all([loadAiPolicy(), loadTenants()]);
      } catch (err) {
        setStatus(`Erro ao atualizar tenant: ${err.message}`, true);
      }
    });

    tenantsEl.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-open-tenant]");
      if (!btn) return;
      try {
        await openTenantDetail(btn.dataset.openTenant, "costs");
      } catch (err) {
        setStatus(`Erro ao abrir painel do tenant: ${err.message}`, true);
      }
    });

    document.getElementById("tenant-detail-close").addEventListener("click", () => {
      tenantDetailSection.classList.add("hidden");
      tenantFrame.src = "about:blank";
      currentTenantSlug = "";
    });
    tenantDetailSection.addEventListener("click", (e) => {
      if (e.target === tenantDetailSection) {
        tenantDetailSection.classList.add("hidden");
        tenantFrame.src = "about:blank";
        currentTenantSlug = "";
      }
    });

    document.querySelectorAll(".tenant-tab").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!currentTenantSlug) return;
        const tab = btn.dataset.tenantTab;
        activateTab(tab);
        try {
          if (["costs", "executions", "sandbox"].includes(tab)) {
            tenantFrame.src = await getDelegatedUrl(currentTenantSlug, `/${tab}`);
          } else if (tab === "api") {
            await loadModelSuggestions();
            await loadTenantApiSettings(currentTenantSlug);
          } else if (tab === "company") {
            await loadTenantCompany(currentTenantSlug);
          }
        } catch (err) {
          setStatus(`Erro ao carregar aba ${tab}: ${err.message}`, true);
        }
      });
    });

    document.getElementById("save-tenant-api").addEventListener("click", async () => {
      if (!currentTenantSlug) return;
      try {
        await api(`/api/admin/tenants/${encodeURIComponent(currentTenantSlug)}/api-settings`, {
          method: "PUT",
          body: JSON.stringify({
            api_models_enabled: document.getElementById("tenant-api-enabled").checked,
            openrouter_api_key: document.getElementById("tenant-api-key").value.trim(),
            model: document.getElementById("tenant-model").value.trim(),
            audio_model: document.getElementById("tenant-audio-model").value.trim(),
            image_model: document.getElementById("tenant-image-model").value.trim(),
            max_executions: parseInt(document.getElementById("tenant-max-executions").value || "200", 10),
          }),
        });
        await Promise.all([loadTenants(), loadAiPolicy()]);
        setStatus("Configurações de API salvas.");
      } catch (err) {
        setStatus(`Erro ao salvar API do tenant: ${err.message}`, true);
      }
    });

    document.getElementById("save-company-profile").addEventListener("click", async () => {
      if (!currentTenantSlug) return;
      try {
        await api(`/api/admin/tenants/${encodeURIComponent(currentTenantSlug)}/company`, {
          method: "PUT",
          body: JSON.stringify({
            owner_name: document.getElementById("company-owner-name").value.trim(),
            owner_phone: document.getElementById("company-owner-phone").value.trim(),
            plan_name: document.getElementById("company-plan-name").value.trim(),
            plan_amount: parseFloat(document.getElementById("company-plan-amount").value || "0"),
            due_day: parseInt(document.getElementById("company-due-day").value || "10", 10),
            contract_start_ts: tsFromDateInput(document.getElementById("company-contract-start").value),
            contract_end_ts: tsFromDateInput(document.getElementById("company-contract-end").value),
            notes: document.getElementById("company-notes").value.trim(),
          }),
        });
        await Promise.all([loadTenantCompany(currentTenantSlug), loadTenants()]);
        setStatus("Dados da empresa salvos.");
      } catch (err) {
        setStatus(`Erro ao salvar dados da empresa: ${err.message}`, true);
      }
    });

    document.getElementById("save-invoice-btn").addEventListener("click", async () => {
      if (!currentTenantSlug) return;
      const period = document.getElementById("invoice-period").value.trim();
      if (!period) return setStatus("Informe o período da mensalidade (YYYY-MM).", true);
      try {
        await api(`/api/admin/tenants/${encodeURIComponent(currentTenantSlug)}/invoices/${encodeURIComponent(period)}`, {
          method: "PUT",
          body: JSON.stringify({
            due_ts: tsFromDateInput(document.getElementById("invoice-due-date").value),
            amount: parseFloat(document.getElementById("invoice-amount").value || "0"),
            paid: document.getElementById("invoice-paid").checked,
          }),
        });
        await Promise.all([loadTenantCompany(currentTenantSlug), loadTenants()]);
        setStatus("Mensalidade salva.");
      } catch (err) {
        setStatus(`Erro ao salvar mensalidade: ${err.message}`, true);
      }
    });

    loadSetupStatus();
  </script>
</body>
</html>
