services:
  whatsbot:
    build: .
    container_name: whatsbot
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - coolify
    volumes:
      - whatsbot-contacts:/app/contacts
      - whatsbot-storages:/app/storages
      - whatsbot-statics:/app/statics
      - whatsbot-logs:/app/logs
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.services.whatsbot.loadbalancer.server.port=8080
    environment:
      - WHATSBOT_DOCKER=1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - WHATSBOT_MODEL=${WHATSBOT_MODEL:-}
      - WHATSBOT_SYSTEM_PROMPT=${WHATSBOT_SYSTEM_PROMPT:-}
      - WHATSBOT_WEB_PORT=${WHATSBOT_WEB_PORT:-8080}
      - WHATSBOT_GOWA_PORT=${WHATSBOT_GOWA_PORT:-3000}

networks:
  coolify:
    external: true

volumes:
  whatsbot-contacts:
  whatsbot-storages:
  whatsbot-statics:
  whatsbot-logs:
