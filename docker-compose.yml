version: "3.8"

services:
  whatsbot:
    build: .
    container_name: whatsbot
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - whatsbot-contacts:/app/contacts
      - whatsbot-storages:/app/storages
      - whatsbot-statics:/app/statics
      - whatsbot-logs:/app/logs
    environment:
      - WHATSBOT_DOCKER=1
      - WHATSBOT_WEB_PORT=${WHATSBOT_WEB_PORT:-8080}
      - WHATSBOT_GOWA_PORT=${WHATSBOT_GOWA_PORT:-3000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

volumes:
  whatsbot-contacts:
  whatsbot-storages:
  whatsbot-statics:
  whatsbot-logs:
